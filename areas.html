<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-black:   #111111;
      --c-charcoal:#2a2a2a;
      --c-gray:    #6b6b6b;
      --c-silver:  #d4d4d4;
      --c-bg:      #f7f5f2;
      --c-white:   #ffffff;
      --c-accent:  #d04a02;
      --c-accent2: #f26522;
      --ff-display:"Noto Serif KR", serif;
      --ff-body:   "Noto Sans KR", sans-serif;
      --r: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--c-bg); color: var(--c-charcoal); line-height: 1.7; min-height: 100vh; }

    /* ── HEADER ── */
    header { position: sticky; top: 0; z-index: 100; background: var(--c-white); border-bottom: 1px solid var(--c-silver); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; }
    .logo-text { font-family: var(--ff-display); font-size: 1.2rem; font-weight: 900; color: var(--c-black); text-decoration: none; }
    .logo-text span { color: var(--c-accent); }
    nav a { text-decoration: none; color: var(--c-charcoal); font-size: .85rem; font-weight: 600; margin-left: 1.4rem; transition: color .2s; }
    nav a:hover, nav a.active { color: var(--c-accent); }
    .btn-header { background: var(--c-accent); color: #fff; border: none; border-radius: 4px; padding: .45rem 1rem; font-size: .82rem; font-weight: 700; cursor: pointer; margin-left: 1.6rem; text-decoration: none; }
    .mobile-menu-btn { display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; }
    .mobile-nav { display:none; position:fixed; inset:0; background:#fff; z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:2rem; }
    .mobile-nav.open { display:flex; }
    .mobile-nav a { font-size:1.1rem; font-weight:700; color:var(--c-charcoal); text-decoration:none; }
    .mobile-nav-close { position:absolute; top:1.2rem; right:1.5rem; font-size:2rem; background:none; border:none; cursor:pointer; }
    @media(max-width:768px){ nav{display:none;} .mobile-menu-btn{display:block;} }

    /* ── CONTAINER ── */
    .container { max-width: 1060px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── PAGE HERO ── */
    .page-hero { background: var(--c-black); color: #fff; padding: 3.5rem 2rem; text-align: center; }
    .page-hero .divider { display: flex; align-items: center; gap: 1rem; justify-content: center; font-size: .78rem; color: #888; margin-bottom: 1rem; }
    .page-hero .divider::before, .page-hero .divider::after { content: ''; flex: 1; max-width: 60px; height: 1px; background: #555; }
    .page-hero h1 { font-family: var(--ff-display); font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 900; line-height: 1.3; }
    .page-hero h1 em { color: var(--c-accent2); font-style: normal; }
    .page-hero p { color: #aaa; font-size: .9rem; margin-top: .8rem; }

    /* ── BREADCRUMB ── */
    .breadcrumb { padding: 1rem 0; font-size: .8rem; color: var(--c-gray); display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .breadcrumb a { color: var(--c-gray); text-decoration: none; }
    .breadcrumb a:hover { color: var(--c-accent); }
    .breadcrumb .sep { color: var(--c-silver); }
    .breadcrumb .current { color: var(--c-accent); font-weight: 700; }

    /* ── VIEWS ── */
    #app { padding: 2.5rem 1.5rem 4rem; }

    /* ── 시도 GRID ── */
    .sido-section-label { text-align: center; font-size: .78rem; font-weight: 700; color: var(--c-gray); margin-bottom: 1.2rem; letter-spacing: .06em; }
    .sido-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 860px; margin: 0 auto; }
    @media(max-width:640px){ .sido-grid { grid-template-columns: repeat(2, 1fr); } }
    .sido-card { background: var(--c-white); border: 1.5px solid var(--c-silver); border-radius: var(--r); padding: 1.6rem 1rem; text-align: center; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .15s; }
    .sido-card:hover { border-color: var(--c-accent); box-shadow: 0 4px 18px rgba(208,74,2,.12); transform: translateY(-3px); }
    .sido-card .icon { font-size: 2rem; margin-bottom: .6rem; }
    .sido-card .name { font-size: 1rem; font-weight: 800; color: var(--c-black); }
    .sido-card .count { font-size: .72rem; color: var(--c-gray); margin-top: .2rem; }

    /* ── 시군구 LIST ── */
    .back-btn { display: inline-flex; align-items: center; gap: .4rem; font-size: .85rem; font-weight: 700; color: var(--c-charcoal); background: var(--c-white); border: 1px solid var(--c-silver); border-radius: 6px; padding: .5rem 1rem; cursor: pointer; margin-bottom: 1.6rem; font-family: var(--ff-body); transition: color .2s, border-color .2s; text-decoration: none; }
    .back-btn:hover { color: var(--c-accent); border-color: var(--c-accent); }
    .sigungu-header { margin-bottom: 1.6rem; }
    .sigungu-header h2 { font-family: var(--ff-display); font-size: 1.4rem; font-weight: 900; }
    .sigungu-header h2 span { color: var(--c-accent); }
    .sigungu-header p { font-size: .85rem; color: var(--c-gray); margin-top: .3rem; }
    .sigungu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .8rem; }
    @media(max-width:640px){ .sigungu-grid { grid-template-columns: repeat(2, 1fr); } }
    .sigungu-card { background: var(--c-white); border: 1px solid var(--c-silver); border-radius: 8px; padding: 1rem .8rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s, transform .15s; }
    .sigungu-card:hover { border-color: var(--c-accent); background: #fff8f5; transform: translateY(-2px); }
    .sigungu-card .sg-name { font-size: .92rem; font-weight: 800; color: var(--c-black); }
    .sigungu-card .sg-label { font-size: .72rem; color: var(--c-accent); margin-top: .2rem; font-weight: 600; }

    /* ── DETAIL PAGE ── */
    .detail-hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; border-radius: 12px; padding: 2.5rem 2rem; text-align: center; margin-bottom: 2rem; position: relative; overflow: hidden; }
    .detail-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(208,74,2,.15) 0%, transparent 70%); }
    .detail-hero .d-badge { display: inline-block; background: var(--c-accent); color: #fff; font-size: .72rem; font-weight: 700; padding: .28rem .9rem; border-radius: 20px; margin-bottom: 1rem; position: relative; }
    .detail-hero h1 { font-family: var(--ff-display); font-size: clamp(1.4rem,3vw,2rem); font-weight: 900; position: relative; }
    .detail-hero .d-sub { color: #aaa; font-size: .82rem; margin-top: .5rem; position: relative; }
    .detail-hero .d-free { color: var(--c-accent2); font-size: .85rem; font-weight: 700; margin-top: .4rem; position: relative; }
    .detail-hero .d-loc { color: #888; font-size: .78rem; margin-top: .3rem; position: relative; }

    .detail-intro { text-align: center; margin-bottom: 2rem; padding: 0 1rem; }
    .detail-intro p { font-size: .9rem; color: var(--c-charcoal); line-height: 2; }

    .detail-btns { display: flex; gap: .8rem; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .detail-btns a { display: inline-flex; align-items: center; gap: .4rem; padding: .8rem 1.8rem; border-radius: 6px; font-size: .9rem; font-weight: 800; text-decoration: none; transition: opacity .2s; }
    .btn-primary { background: var(--c-black); color: #fff; }
    .btn-outline { border: 2px solid var(--c-charcoal); color: var(--c-charcoal); }
    .btn-primary:hover, .btn-outline:hover { opacity: .8; }

    .detail-services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    @media(max-width:640px){ .detail-services { grid-template-columns: 1fr 1fr; } }
    .service-chip { background: var(--c-white); border: 1px solid var(--c-silver); border-radius: 8px; padding: 1rem; text-align: center; }
    .service-chip .chip-icon { font-size: 1.4rem; margin-bottom: .3rem; }
    .service-chip .chip-name { font-size: .82rem; font-weight: 700; color: var(--c-black); }

    .detail-desc { background: var(--c-white); border-radius: var(--r); padding: 2rem; margin-bottom: 1.5rem; font-size: .9rem; line-height: 2.1; color: var(--c-charcoal); }
    .detail-desc h3 { font-family: var(--ff-display); font-size: 1.05rem; font-weight: 900; color: var(--c-black); margin-bottom: .8rem; }

    .detail-cta { background: var(--c-accent); color: #fff; border-radius: var(--r); padding: 2rem; text-align: center; }
    .detail-cta h3 { font-family: var(--ff-display); font-size: 1.15rem; font-weight: 900; margin-bottom: .5rem; }
    .detail-cta p { font-size: .85rem; opacity: .85; margin-bottom: 1.2rem; }
    .detail-cta a { display: inline-block; background: #fff; color: var(--c-accent); font-weight: 800; font-size: .95rem; padding: .8rem 2rem; border-radius: 6px; text-decoration: none; margin: .3rem; }

    /* ── FOOTER ── */
    footer { background: var(--c-charcoal); color: #aaa; padding: 2rem; }
    .footer-bottom { max-width: 1060px; margin: 0 auto; font-size: .75rem; color: #666; text-align: center; }
  </style>
</head>

function getSido(id) { return SIDO.find(s => s.id === id); }

function renderSido() {
  document.getElementById('breadcrumb').innerHTML =
    `<a href="areas.html">지역별 서비스</a>`;

  const grid = SIDO.map(s => `
    <div class="sido-card" onclick="go('${s.id}')">
      <div class="icon">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="count">${s.count}</div>
    </div>`).join('');

  document.getElementById('view').innerHTML = `
    <div class="sido-section-label">1. 시·도를 선택하세요</div>
    <div class="sido-grid">${grid}</div>`;

  document.title = '지역별 상가철거 서비스 | 여비철거';
}

function renderSigungu(sidoId) {
  const sido = getSido(sidoId);
  if (!sido) { renderSido(); return; }

  document.getElementById('breadcrumb').innerHTML =
    `<a href="areas.html">지역별 서비스</a>
     <span class="sep">›</span>
     <span class="current">${sido.name}</span>`;

  const cards = sido.list.map(sg => `
    <div class="sigungu-card" onclick="go('${sidoId}/${encodeURIComponent(sg)}')">
      <div class="sg-name">${sg}</div>
      <div class="sg-label">상가철거 보기</div>
    </div>`).join('');

function go(hash) {
  location.hash = hash;
}

function route() {
  const hash = decodeURIComponent(location.hash.replace('#', ''));
  if (!hash) { renderSido(); return; }
  const parts = hash.split('/');
  if (parts.length === 1) { renderSigungu(parts[0]); }
  else if (parts.length >= 2) { renderDetail(parts[0], parts.slice(1).join('/')); }
  else { renderSido(); }
}

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
</script>
