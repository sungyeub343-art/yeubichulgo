      --c-accent:  #d04a02;

    .btn-header { background: var(--c-accent); color: #fff; border: none; border-radius: 4px; padding: .45rem 1rem; font-size: .82rem; font-weight: 700; cursor: pointer; margin-left: 1.6rem; text-decoration: none; }
    .mobile-menu-btn { display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; }
    .mobile-nav { display:none; position:fixed; inset:0; background:#fff; z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:2rem; }
    .mobile-nav.open { display:flex; }
    .mobile-nav a { font-size:1.1rem; font-weight:700; color:var(--c-charcoal); text-decoration:none; }
    .mobile-nav-close { position:absolute; top:1.2rem; right:1.5rem; font-size:2rem; background:none; border:none; cursor:pointer; }

    /* ── CONTAINER ── */
    .container { max-width: 1060px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── PAGE HERO ── */

    .page-hero h1 em { color: var(--c-accent2); font-style: normal; }
    .page-hero p { color: #aaa; font-size: .9rem; margin-top: .8rem; }

    /* ── BREADCRUMB ── */
    .breadcrumb { padding: 1rem 0; font-size: .8rem; color: var(--c-gray); display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .breadcrumb a { color: var(--c-gray); text-decoration: none; }
    .breadcrumb a:hover { color: var(--c-accent); }
    .breadcrumb .sep { color: var(--c-silver); }
    .breadcrumb .current { color: var(--c-accent); font-weight: 700; }

    /* ── VIEWS ── */
    #app { padding: 2.5rem 1.5rem 4rem; }

    /* ── 시도 GRID ── */
    .sido-section-label { text-align: center; font-size: .78rem; font-weight: 700; color: var(--c-gray); margin-bottom: 1.2rem; letter-spacing: .06em; }
    .sido-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 860px; margin: 0 auto; }
    @media(max-width:640px){ .sido-grid { grid-template-columns: repeat(2, 1fr); } }
    .sido-card { background: var(--c-white); border: 1.5px solid var(--c-silver); border-radius: var(--r); padding: 1.6rem 1rem; text-align: center; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .15s; }
    .sido-card:hover { border-color: var(--c-accent); box-shadow: 0 4px 18px rgba(208,74,2,.12); transform: translateY(-3px); }
    .sido-card .icon { font-size: 2rem; margin-bottom: .6rem; }
    .sido-card .name { font-size: 1rem; font-weight: 800; color: var(--c-black); }
    .sido-card .count { font-size: .72rem; color: var(--c-gray); margin-top: .2rem; }

    .dong-card { background: var(--c-white); border: 1px solid var(--c-silver); border-radius: 6px; padding: .7rem .5rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s, transform .15s; }

</head>

function getSido(id) { return SIDO.find(s => s.id === id); }
function getDongKey(sidoId, sgName) { return sidoId + '/' + sgName; }
function getDongList(sidoId, sgName) { return DONG[getDongKey(sidoId, sgName)] || []; }

function renderSido() {
  document.getElementById('breadcrumb').innerHTML =
    `<a href="areas.html">지역별 서비스</a>`;

  const grid = SIDO.map(s => `
    <div class="sido-card" onclick="go('${s.id}')">
      <div class="icon">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="count">${s.count}</div>
    </div>`).join('');

  document.getElementById('view').innerHTML = `
    <div class="sido-section-label">1. 시·도를 선택하세요</div>
    <div class="sido-grid">${grid}</div>`;

  document.title = '지역별 상가철거 서비스 | 여비철거';
}

function renderSigungu(sidoId) {
  const sido = getSido(sidoId);
  if (!sido) { renderSido(); return; }

  document.getElementById('breadcrumb').innerHTML =
    `<a href="areas.html">지역별 서비스</a>
     <span class="sep">›</span>
     <span class="current">${sido.name}</span>`;

  const cards = sido.list.map(sg => {
    const dongs = getDongList(sidoId, sg);
    const label = dongs.length > 0 ? dongs.length + '개 동·읍·면' : '서비스 보기';
    return `
    <div class="sigungu-card" onclick="go('${sidoId}/${encodeURIComponent(sg)}')">
      <div class="sg-name">${sg}</div>
      <div class="sg-label">${label}</div>
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <button class="back-btn" onclick="go('')">← 시도 선택으로</button>
    <div class="sigungu-header">
      <h2>${sido.icon} <span>${sido.name}</span> 지역 상가철거</h2>
      <p>시·군·구를 선택하면 동·읍·면별 서비스를 안내해 드립니다.</p>
    </div>
    <div class="sigungu-grid">${cards}</div>`;

  document.title = `${sido.name} 상가철거 | 여비철거`;
}

function renderDong(sidoId, sgName) {
  const sido = getSido(sidoId);
  if (!sido) { renderSido(); return; }
  const name = decodeURIComponent(sgName);
  const dongs = getDongList(sidoId, name);

  document.getElementById('breadcrumb').innerHTML =
    `<a href="areas.html">지역별 서비스</a>
     <span class="sep">›</span>
     <a href="#${sidoId}">${sido.name}</a>
     <span class="sep">›</span>
     <span class="current">${name}</span>`;

  if (dongs.length === 0) {
    renderDetail(sidoId, name, '');
    return;
  }

  const cards = dongs.map(d => `
    <div class="dong-card" onclick="go('${sidoId}/${encodeURIComponent(name)}/${encodeURIComponent(d)}')">
      <div class="d-name">${d}</div>
      <div class="d-label">철거 서비스</div>
    </div>`).join('');

  document.getElementById('view').innerHTML = `
    <button class="back-btn" onclick="go('${sidoId}')">← ${sido.name} 목록으로</button>
    <div class="sigungu-header">
      <h2>📍 <span>${sido.name} ${name}</span> 동·읍·면 선택</h2>
      <p>원하는 동·읍·면을 선택하면 해당 지역 상가철거 서비스를 안내해 드립니다.</p>
    </div>
    <div class="dong-grid">${cards}</div>`;

  document.title = `${sido.name} ${name} 상가철거 | 여비철거`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(hash) {
  location.hash = hash;
}

function route() {
  const hash = decodeURIComponent(location.hash.replace('#', ''));
  if (!hash) { renderSido(); return; }
  const parts = hash.split('/');
  if (parts.length === 1) { renderSigungu(parts[0]); }
  else if (parts.length === 2) { renderDong(parts[0], parts[1]); }
  else if (parts.length >= 3) { renderDetail(parts[0], parts[1], parts.slice(2).join('/')); }
  else { renderSido(); }
}

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
</script>
