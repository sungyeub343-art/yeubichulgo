<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c-black:#111;--c-charcoal:#2a2a2a;--c-gray:#6b6b6b;--c-silver:#d4d4d4;--c-bg:#f7f5f2;--c-white:#fff;--c-accent:#d04a02;--c-accent2:#f26522;--ff-display:"Noto Serif KR",serif;--ff-body:"Noto Sans KR",sans-serif;--r:12px}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--c-bg);color:var(--c-charcoal);line-height:1.7}
header{position:sticky;top:0;z-index:100;background:var(--c-white);border-bottom:1px solid var(--c-silver);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px}
.logo-text{font-family:var(--ff-display);font-size:1.2rem;font-weight:900;color:var(--c-black);text-decoration:none}
.logo-text span{color:var(--c-accent)}
nav a{text-decoration:none;color:var(--c-charcoal);font-size:.85rem;font-weight:600;margin-left:1.4rem}
nav a:hover{color:var(--c-accent)}
.btn-header{background:var(--c-accent);color:#fff;border:none;border-radius:4px;padding:.45rem 1rem;font-size:.82rem;font-weight:700;margin-left:1.6rem;text-decoration:none}
@media(max-width:768px){nav{display:none}}
.container{max-width:1060px;margin:0 auto;padding:0 1.5rem}
.page-hero{background:#111;color:#fff;padding:3rem 2rem;text-align:center}
.page-hero h1{font-family:var(--ff-display);font-size:clamp(1.4rem,3.4vw,2.2rem);font-weight:900;line-height:1.35}
.page-hero p{color:#aaa;font-size:.85rem;margin-top:.6rem}
.breadcrumb{padding:1rem 0;font-size:.8rem;color:var(--c-gray)}
.breadcrumb a{color:var(--c-gray);text-decoration:none}
.breadcrumb a:hover{color:var(--c-accent)}
.breadcrumb .current{color:var(--c-accent);font-weight:700}
#app{padding:2rem 1.5rem 4rem}
.link-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-top:1.5rem}
@media(max-width:640px){.link-grid{grid-template-columns:repeat(2,1fr)}}
.link-card{display:block;background:var(--c-white);border:1px solid var(--c-silver);border-radius:8px;padding:1rem;text-align:center;text-decoration:none;color:var(--c-black);font-weight:700;font-size:.88rem}
.link-card:hover{border-color:var(--c-accent);color:var(--c-accent)}
.detail-hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;border-radius:12px;padding:2.5rem 2rem;text-align:center;margin-bottom:2rem}
.detail-hero .d-badge{display:inline-block;background:var(--c-accent);color:#fff;font-size:.72rem;font-weight:700;padding:.28rem .9rem;border-radius:20px;margin-bottom:1rem}
.detail-hero h1{font-family:var(--ff-display);font-size:clamp(1.4rem,3vw,2rem);font-weight:900}
.detail-hero .d-sub{color:#aaa;font-size:.82rem;margin-top:.5rem}
.detail-hero .d-free{color:var(--c-accent2);font-size:.85rem;font-weight:700;margin-top:.4rem}
.detail-hero .d-loc{color:#888;font-size:.78rem;margin-top:.3rem}
.detail-intro{text-align:center;margin-bottom:2rem;padding:0 1rem}
.detail-intro p{font-size:.9rem;line-height:2}
.detail-btns{display:flex;gap:.8rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.detail-btns a{display:inline-flex;align-items:center;gap:.4rem;padding:.8rem 1.8rem;border-radius:6px;font-size:.9rem;font-weight:800;text-decoration:none}
.btn-primary{background:var(--c-black);color:#fff}
.btn-outline{border:2px solid var(--c-charcoal);color:var(--c-charcoal)}
.detail-services{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:640px){.detail-services{grid-template-columns:1fr 1fr}}
.service-chip{background:var(--c-white);border:1px solid var(--c-silver);border-radius:8px;padding:1rem;text-align:center}
.service-chip .chip-icon{font-size:1.4rem;margin-bottom:.3rem}
.service-chip .chip-name{font-size:.82rem;font-weight:700;color:var(--c-black)}
.detail-gallery{background:var(--c-white);border-radius:var(--r);padding:1.6rem;margin-bottom:1.5rem}
.detail-gallery h3{font-family:var(--ff-display);font-size:1.05rem;font-weight:900;color:var(--c-black);margin-bottom:1rem}
.detail-gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem}
.detail-gallery-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px}
@media(max-width:640px){.detail-gallery-grid{grid-template-columns:repeat(2,1fr)}}
.detail-desc{background:var(--c-white);border-radius:var(--r);padding:2rem;margin-bottom:1.5rem;font-size:.9rem}
.detail-desc h3{font-family:var(--ff-display);font-size:1.05rem;font-weight:900;color:var(--c-black);margin-bottom:.8rem}
.dd-lead{font-weight:700;color:var(--c-black);font-size:.92rem;margin-bottom:1.4rem;line-height:1.7}
.dd-block{padding:1rem 0;border-top:1px solid var(--c-bg)}
.dd-block:first-of-type{border-top:none;padding-top:0}
.dd-block h4{display:flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:800;color:var(--c-accent);margin-bottom:.4rem}
.dd-block p{font-size:.86rem;color:var(--c-gray);line-height:1.8}
.dd-cta-line{margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--c-silver);font-weight:800;color:var(--c-black);text-align:center;font-size:.92rem}
.detail-cta{background:var(--c-accent);color:#fff;border-radius:var(--r);padding:2rem;text-align:center}
.detail-cta h3{font-family:var(--ff-display);font-size:1.15rem;font-weight:900;margin-bottom:.5rem}
.detail-cta p{font-size:.85rem;opacity:.85;margin-bottom:1.2rem}
.detail-cta a{display:inline-block;background:#fff;color:var(--c-accent);font-weight:800;font-size:.95rem;padding:.8rem 2rem;border-radius:6px;text-decoration:none;margin:.3rem}
footer{background:var(--c-charcoal);color:#aaa;padding:2rem}
.footer-bottom{max-width:1060px;margin:0 auto;font-size:.75rem;color:#666;text-align:center}
</style>
